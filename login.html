<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マネージャー - Login</title>
    <style>
        /* === TEMA AESTHETIC JEPANG (ZEN) === */
        :root {
            --bg-rice: #F5F5F0; --bg-white: #FFFFFF; --text-dark: #2D3748; --text-muted: #718096;
            --matcha-green: #8F9779; --sakura-pink: #D98C8C; --border-color: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-rice); color: var(--text-dark); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-box { background: var(--bg-white); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }
        
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; background: var(--bg-rice); outline: none; transition: 0.2s; }
        .form-input:focus { border-color: var(--matcha-green); background: var(--bg-white); }
        
        .btn-auth { width: 100%; background: var(--matcha-green); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(143,151,121,0.2); }
        
        .toggle-text { margin-top: 20px; font-size: 13px; color: var(--text-muted); }
        .toggle-text span { color: var(--matcha-green); font-weight: bold; cursor: pointer; transition: 0.2s; }
        .toggle-text span:hover { text-decoration: underline; }

        #toast { position: fixed; bottom: -50px; left: 50%; transform: translateX(-50%); background: var(--text-dark); color: white; padding: 12px 24px; border-radius: 8px; transition: 0.3s; opacity: 0; z-index: 1000; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-box">
        <div class="logo">マネージャー</div>
        <div class="subtitle" id="form-subtitle">Welcome back! Please login.</div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" class="form-input" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" class="form-input" placeholder="••••••••">
        </div>

        <button class="btn-auth" id="btn-submit" onclick="handleAuth()">Login</button>

        <div class="toggle-text" id="toggle-container">
            Don't have an account? <span onclick="toggleMode()">Sign Up</span>
        </div>
    </div>

    <div id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://pbvjxiyijesakcnywgdv.supabase.co';
        const supabaseKey = 'sb_publishable_2yVPX7xdB2PnDNR3Pi4R-A_acaqtDH3';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let isLoginMode = true;

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.backgroundColor = isError ? 'var(--sakura-pink)' : 'var(--matcha-green)';
            t.style.bottom = '30px'; t.style.opacity = '1';
            setTimeout(() => { t.style.bottom = '-50px'; t.style.opacity = '0'; }, 3000);
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('btn-submit').innerText = isLoginMode ? 'Login' : 'Create Account';
            document.getElementById('form-subtitle').innerText = isLoginMode ? 'Welcome back! Please login.' : 'Create a new account to get started.';
            document.getElementById('toggle-container').innerHTML = isLoginMode 
                ? 'Don\'t have an account? <span onclick="toggleMode()">Sign Up</span>' 
                : 'Already have an account? <span onclick="toggleMode()">Login</span>';
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('btn-submit');

            if(!email || !password) { showToast("Email & Password wajib diisi!", true); return; }

            btn.disabled = true;
            btn.innerText = "Processing...";

            if(isLoginMode) {
                // Proses Login
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if(error) {
                    showToast(error.message, true);
                    btn.disabled = false; btn.innerText = "Login";
                } else {
                    showToast("Login berhasil! Mengalihkan...");
                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                }
            } else {
                // Proses Register
                const { data, error } = await supabaseClient.auth.signUp({ email, password });
                if(error) {
                    showToast(error.message, true);
                    btn.disabled = false; btn.innerText = "Create Account";
                } else {
                    showToast("Akun berhasil dibuat! Silakan Login.");
                    toggleMode();
                    btn.disabled = false;
                }
            }
        }

        // Cek kalau udah login, otomatis pindah ke index.html
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if(session) window.location.href = 'index.html';
        }
    </script>
</body>
</html>
